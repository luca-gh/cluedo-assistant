<!DOCTYPE html>

<!-- Pagina principale della web app Cluedo Assistant -->
<html lang="it">

<head>

    <!-- Impostazioni base della pagina -->
    <meta charset="UTF-8">

    <!-- Adatta la pagina a PC, tablet e iPad -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Titolo della scheda del browser -->
    <title>Cluedo Assistant</title>

    <!-- Collegamento al file CSS -->
    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- Titolo principale -->
    <h1>Cluedo Assistant</h1>

    <!-- Bottone per iniziare una nuova partita -->
    <button id="newGameButton">
        Nuova Partita
    </button>

    <!-- Area in cui JavaScript costruirà la tabella -->
    <div id="gameArea"></div>

    <!-- Collegamento al file JavaScript -->
    <script src="app.js"></script>

</body>

</html>
